apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argo
resources:
  - install.yaml
  - executor-rbac.yaml
patches:
  - target:
      kind: Deployment
      name: argo-server
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/args
        value:
          - server
          - --auth-mode=server
