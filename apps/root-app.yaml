# Root Application – bootstrap once with: kubectl apply -f apps/root-app.yaml
# After this, Argo CD manages all child Applications from apps/infrastructure/.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: https://github.com/MWest2020/homelab.git
    targetRevision: main
    path: apps/infrastructure
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
