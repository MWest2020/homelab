# Argo CD self-management. prune: false to prevent accidental self-deletion.
# HTTPRoute (argocd.westerweel.work) is included via third source.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: 9.4.7
      helm:
        releaseName: argocd
        valueFiles:
          - $values/kubernetes/infrastructure/argocd/values.yaml
    - repoURL: https://github.com/MWest2020/homelab.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/MWest2020/homelab.git
      targetRevision: main
      path: kubernetes/infrastructure/argocd
      directory:
        include: 'httproute.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
