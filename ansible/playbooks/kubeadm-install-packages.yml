---
# Installeer kubeadm, kubelet, kubectl op alle cluster-nodes.
# Gebruik: na Fase B (Hard Way gestopt). Draai vanaf jumpbox:
#   cd ansible && ansible-playbook playbooks/kubeadm-install-packages.yml
#
# Vereisten: inventory hosts.yml (control_plane + workers), SSH toegang.
# Voor Alma/RHEL: pas tasks aan naar dnf of gebruik een aparte role.

- name: Install Kubernetes packages (kubeadm, kubelet, kubectl)
  hosts: k8s_cluster
  become: true
  serial: 1
  # Eén node per keer, zodat je voortgang ziet en het niet lijkt te hangen

  vars:
    k8s_packages:
      - kubelet
      - kubeadm
      - kubectl
    # Repo v1.29 voor packages; key van nieuwere versie (zelfde key, maar v1.29 Release.key kan verlopen zijn)
    k8s_apt_repo_key_url: "https://pkgs.k8s.io/core:/stable:/v1.31/deb/Release.key"
    k8s_apt_repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /"

  tasks:
    - name: Create keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: "Assert Debian/Ubuntu (voor Alma/RHEL zie docs/30-migratie-kubeadm.md Fase C)"
      ansible.builtin.assert:
        that: ansible_os_family == "Debian"
        fail_msg: "Dit playbook is voor Debian/Ubuntu. Voor Alma/RHEL voer Fase C handmatig uit of voeg dnf-tasks toe."

    - name: Add Kubernetes APT key (dearmor voor apt signed-by)
      ansible.builtin.shell: |
        curl -fsSL --connect-timeout 15 --max-time 60 "{{ k8s_apt_repo_key_url }}" | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      register: k8s_key_result
      failed_when: k8s_key_result.rc != 0

    - name: Set keyring permissions
      ansible.builtin.file:
        path: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        mode: '0644'
        state: file

    - name: Add Kubernetes APT repository
      ansible.builtin.apt_repository:
        repo: "{{ k8s_apt_repo }}"
        filename: kubernetes
        state: present

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install Kubernetes packages
      ansible.builtin.apt:
        name: "{{ k8s_packages }}"
        state: present

    - name: Hold Kubernetes packages (prevent auto-upgrade)
      ansible.builtin.command: apt-mark hold {{ k8s_packages | join(' ') }}
      changed_when: false
