---
# Bouwt de Kubernetes-VM-templates op elke Proxmox-clusterhost (idempotent):
#   9000 = ubuntu-24.04 cloud base
#   9001 = control-plane shape (4 cores / 8GB / 50G)
#   9002 = worker shape        (4 cores / 16GB / 50G)
#
# Hardware-shape zit BEWUST in de template, niet in terraform (bpg hangt op
# post-clone overrides — zie feedback_template_per_size).
#
# Run vanaf jumpy (na Tailscale op de hosts + px-01/02/03 in de inventory):
#   ansible-playbook -i inventory/hypervisors.yml playbooks/build-k8s-templates.yml
#   # eerst één host testen:
#   ansible-playbook -i inventory/hypervisors.yml playbooks/build-k8s-templates.yml --limit px-01

- name: Build Kubernetes VM templates on Proxmox cluster hosts
  hosts: proxmox_cluster
  gather_facts: false

  vars:
    ubuntu_img_url: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
    ubuntu_img: "/var/lib/vz/template/noble-server-cloudimg-amd64.img"
    storage: local-lvm

  tasks:
    - name: Download ubuntu-24.04 cloud image (idempotent)
      ansible.builtin.get_url:
        url: "{{ ubuntu_img_url }}"
        dest: "{{ ubuntu_img }}"
        mode: '0644'

    # ---- 9000: base template ----
    - name: Check of 9000 bestaat
      ansible.builtin.command: qm config 9000
      register: t9000
      changed_when: false
      failed_when: false

    - name: Build base-template 9000
      when: t9000.rc != 0
      changed_when: true
      ansible.builtin.shell: |
        set -e
        qm create 9000 --name ubuntu-24.04-template --memory 2048 --cores 2 --net0 virtio,bridge=vmbr0
        qm importdisk 9000 {{ ubuntu_img }} {{ storage }}
        qm set 9000 --scsihw virtio-scsi-pci --scsi0 {{ storage }}:vm-9000-disk-0
        qm set 9000 --ide2 {{ storage }}:cloudinit
        qm set 9000 --boot order=scsi0 --serial0 socket --vga serial0
        qm template 9000

    # ---- 9001: control-plane shape (4c/8GB/50G) ----
    - name: Check of 9001 bestaat
      ansible.builtin.command: qm config 9001
      register: t9001
      changed_when: false
      failed_when: false

    - name: Build CP-template 9001
      when: t9001.rc != 0
      changed_when: true
      ansible.builtin.shell: |
        set -e
        qm clone 9000 9001 --full --name k8s-cp-template
        qm resize 9001 scsi0 50G
        qm set 9001 --cores 4 --memory 8192
        qm template 9001

    # ---- 9002: worker shape (4c/16GB/50G) ----
    - name: Check of 9002 bestaat
      ansible.builtin.command: qm config 9002
      register: t9002
      changed_when: false
      failed_when: false

    - name: Build worker-template 9002
      when: t9002.rc != 0
      changed_when: true
      ansible.builtin.shell: |
        set -e
        qm clone 9000 9002 --full --name k8s-worker-template
        qm resize 9002 scsi0 50G
        qm set 9002 --cores 4 --memory 16384
        qm template 9002

    - name: Toon aanwezige templates
      ansible.builtin.command: qm list
      register: qmlist
      changed_when: false

    - name: Print template-overzicht
      ansible.builtin.debug:
        msg: "{{ qmlist.stdout_lines | select('search', '900[012]') | list }}"
