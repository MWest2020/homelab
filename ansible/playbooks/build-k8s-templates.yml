---
# Bouwt de Kubernetes-VM-templates op elke Proxmox-clusterhost (idempotent).
#
# LET OP: VMID's zijn CLUSTER-BREED uniek (niet per-node), en met local-lvm kun je
# een template niet cross-node clonen. Daarom heeft elke host een EIGEN VMID-reeks,
# bepaald door `tmpl_base` (host-var in de inventory):
#   px-01 tmpl_base=9000 -> 9000 (base) / 9001 (CP 4c/8GB/50G) / 9002 (worker 4c/16GB/50G)
#   px-02 tmpl_base=9010 -> 9010 / 9011 / 9012
#   px-03 tmpl_base=9020 -> 9020 / 9021 / 9022
#
# Hardware-shape zit in de template, niet in terraform (bpg hangt op post-clone overrides).
#
# Run vanaf jumpy:
#   ansible-playbook -i inventory/hypervisors.yml playbooks/build-k8s-templates.yml --limit px-01
#   ansible-playbook -i inventory/hypervisors.yml playbooks/build-k8s-templates.yml

- name: Build Kubernetes VM templates on Proxmox cluster hosts
  hosts: proxmox_cluster
  gather_facts: false

  vars:
    ubuntu_img_url: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
    ubuntu_img: "/var/lib/vz/template/noble-server-cloudimg-amd64.img"
    storage: local-lvm
    base_id: "{{ tmpl_base }}"
    cp_id: "{{ tmpl_base + 1 }}"
    worker_id: "{{ tmpl_base + 2 }}"

  tasks:
    - name: Download ubuntu-24.04 cloud image (idempotent)
      ansible.builtin.get_url:
        url: "{{ ubuntu_img_url }}"
        dest: "{{ ubuntu_img }}"
        mode: '0644'

    # ---- base template ----
    - name: Check of base-template {{ base_id }} bestaat
      ansible.builtin.command: "qm config {{ base_id }}"
      register: t_base
      changed_when: false
      failed_when: false

    - name: Build base-template {{ base_id }}
      when: t_base.rc != 0
      changed_when: true
      ansible.builtin.shell: |
        set -e
        qm create {{ base_id }} --name ubuntu-24.04-template --memory 2048 --cores 2 --net0 virtio,bridge=vmbr0
        qm importdisk {{ base_id }} {{ ubuntu_img }} {{ storage }}
        qm set {{ base_id }} --scsihw virtio-scsi-pci --scsi0 {{ storage }}:vm-{{ base_id }}-disk-0
        qm set {{ base_id }} --ide2 {{ storage }}:cloudinit
        qm set {{ base_id }} --boot order=scsi0 --serial0 socket --vga serial0
        qm template {{ base_id }}

    # ---- control-plane shape (4c/8GB/50G) ----
    - name: Check of CP-template {{ cp_id }} bestaat
      ansible.builtin.command: "qm config {{ cp_id }}"
      register: t_cp
      changed_when: false
      failed_when: false

    - name: Build CP-template {{ cp_id }}
      when: t_cp.rc != 0
      changed_when: true
      ansible.builtin.shell: |
        set -e
        qm clone {{ base_id }} {{ cp_id }} --full --name k8s-cp-template
        qm resize {{ cp_id }} scsi0 50G
        qm set {{ cp_id }} --cores 4 --memory 8192 --cpu host
        qm template {{ cp_id }}

    # ---- worker shape (4c/16GB/50G) ----
    - name: Check of worker-template {{ worker_id }} bestaat
      ansible.builtin.command: "qm config {{ worker_id }}"
      register: t_worker
      changed_when: false
      failed_when: false

    - name: Build worker-template {{ worker_id }}
      when: t_worker.rc != 0
      changed_when: true
      ansible.builtin.shell: |
        set -e
        qm clone {{ base_id }} {{ worker_id }} --full --name k8s-worker-template
        qm resize {{ worker_id }} scsi0 50G
        qm set {{ worker_id }} --cores 4 --memory 16384 --cpu host
        qm template {{ worker_id }}

    - name: Toon aanwezige templates
      ansible.builtin.command: qm list
      register: qmlist
      changed_when: false

    - name: Print template-overzicht
      ansible.builtin.debug:
        msg: "{{ qmlist.stdout_lines | select('search', 'template') | list }}"
