---
- name: Deploy Nextcloud tenant stacks
  hosts: nextcloud
  become: true
  tasks:
    - name: Create nextcloud directory
      file:
        path: /opt/nextcloud
        state: directory
        owner: ubuntu
        group: ubuntu

    - name: Copy docker-compose.yml
      copy:
        src: ../../docker/nextcloud/docker-compose.yml
        dest: /opt/nextcloud/docker-compose.yml
        owner: ubuntu
        group: ubuntu
      register: compose_file

    - name: Copy nginx.conf
      copy:
        src: ../../docker/nextcloud/nginx.conf
        dest: /opt/nextcloud/nginx.conf
        owner: ubuntu
        group: ubuntu
      register: nginx_conf

    - name: Generate .env from tenant variables
      template:
        src: ../templates/nextcloud-env.j2
        dest: /opt/nextcloud/.env
        owner: ubuntu
        group: ubuntu
        mode: "0600"
      register: env_file

    - name: Pull latest images
      shell: docker compose pull
      args:
        chdir: /opt/nextcloud
      become: false

    - name: Start Nextcloud stack
      shell: >
        docker compose up -d
        {{ '--force-recreate' if (compose_file.changed or nginx_conf.changed or env_file.changed) else '' }}
      args:
        chdir: /opt/nextcloud
      become: false
