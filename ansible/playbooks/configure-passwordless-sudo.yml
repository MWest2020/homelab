---
# Eenmalig: geef gongoeloe (of ansible_user) passwordless sudo op alle nodes.
# Daarna kun je alle andere playbooks zonder --ask-become-pass draaien.
#
# Draai één keer (vanaf jumpbox of Alma):
#   cd ~/homelab/ansible
#   ansible-playbook playbooks/configure-passwordless-sudo.yml --ask-become-pass
#
# Daarna: geen BECOME password meer nodig voor andere playbooks.

- name: Configure passwordless sudo for Ansible user
  hosts: k8s_cluster
  become: true

  tasks:
    - name: Create sudoers.d file for {{ ansible_user }} (NOPASSWD)
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ ansible_user }}-nopasswd"
        content: "{{ ansible_user }} ALL=(ALL) NOPASSWD:ALL\n"
        owner: root
        group: root
        mode: '0440'
        validate: 'visudo -cf %s'
