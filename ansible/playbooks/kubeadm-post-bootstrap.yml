---
# Fase F t/m K: Cilium, Gateway CRDs, MetalLB, cert-manager, Gateway-stack, kubeconfig op jumpbox.
# Draai vanaf jumpbox, NA kubeadm-bootstrap.yml. Repo-root = map boven ansible/ (dus vanaf homelab/).
#
# Gebruik (vanaf jumpbox):
#   cd ~/homelab/ansible
#   ansible-playbook playbooks/kubeadm-post-bootstrap.yml
#
# Optioneel: Cloudflare-token meegeven (anders handmatig secret aanmaken):
#   ansible-playbook playbooks/kubeadm-post-bootstrap.yml -e "cert_manager_cloudflare_token=JOUW_TOKEN"
#
# Vereisten: kubectl en helm geïnstalleerd op jumpbox; SSH naar cp-01 (voor fetch kubeconfig).

- name: Read kubeconfig from control plane (as root; fetch often ignores become)
  hosts: control_plane
  gather_facts: false
  become: true
  vars:
    ansible_become: true  # inventory all.vars has ansible_become: false; override here

  tasks:
    - name: Read admin.conf on cp-01 (cat honours become; slurp/fetch do not)
      ansible.builtin.command: cat /etc/kubernetes/admin.conf
      register: admin_conf_raw
      changed_when: false

- name: Configure cluster (Cilium, CRDs, MetalLB, cert-manager, Gateway)
  hosts: localhost
  connection: local
  gather_facts: false  # avoid setup module (would use sudo via ansible.cfg); use lookup('env') for HOME
  become: false

  vars:
    # Override inventory all.vars (ansible_become: true) so we never use sudo on jumpbox
    ansible_become: false
    # Map boven ansible/ (homelab repo root); playbook_dir = ansible/playbooks
    repo_root: "{{ playbook_dir }}/../.."
    home_dir: "{{ lookup('env', 'HOME') }}"
    kubeconfig_path: "{{ home_dir }}/.kube/config"
    # Stel in via -e cert_manager_cloudflare_token=... of laat leeg → secret handmatig aanmaken
    cert_manager_cloudflare_token: ""

  tasks:
    - name: Ensure .kube directory exists
      ansible.builtin.file:
        path: "{{ home_dir }}/.kube"
        state: directory
        mode: '0755'

    - name: Write slurped admin.conf to kubeconfig
      ansible.builtin.copy:
        content: "{{ hostvars[groups['control_plane'][0]].admin_conf_raw.stdout }}"
        dest: "{{ kubeconfig_path }}"
        mode: '0600'
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    # --- Fase F: Cilium ---
    - name: Add Cilium Helm repo
      ansible.builtin.command:
        cmd: helm repo add cilium https://helm.cilium.io/
        creates: "{{ home_dir }}/.cache/helm/repository/cilium-index.yaml"
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      changed_when: true

    - name: Update Helm repos
      ansible.builtin.command: helm repo update
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Install Cilium (CNI + Gateway API)
      ansible.builtin.command: >
        helm upgrade --install cilium cilium/cilium
        --namespace kube-system
        -f {{ repo_root }}/cluster-config/infra/cilium/values.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Wait for Cilium pods
      ansible.builtin.command: kubectl get pods -n kube-system -l k8s-app=cilium -o wide
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: cilium_pods
      changed_when: false

    # --- Fase G: Gateway API CRDs ---
    - name: Apply Gateway API CRDs (standard install)
      ansible.builtin.command: >
        kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.0/standard-install.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    # --- Fase H: MetalLB ---
    - name: Apply MetalLB manifest
      ansible.builtin.command: >
        kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.14.8/config/manifests/metallb-native.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Wait for MetalLB controller to be ready
      ansible.builtin.command: >
        kubectl wait deployment controller
        --namespace metallb-system
        --for=condition=available
        --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Wait for MetalLB speaker daemonset pods to be ready
      ansible.builtin.command: >
        kubectl rollout status daemonset speaker
        --namespace metallb-system
        --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Delete MetalLB validating webhooks (API server cannot reach ClusterIP on this setup; see docs/23-metallb.md)
      ansible.builtin.shell: >
        kubectl get validatingwebhookconfiguration -o name | grep metallb | xargs -r kubectl delete
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      changed_when: true

    - name: Apply MetalLB IP pool (L2, 192.168.178.220-230)
      ansible.builtin.command: kubectl apply -f {{ repo_root }}/kubernetes/infrastructure/metallb/ip-pool.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    # --- Fase I: cert-manager ---
    - name: Add Jetstack Helm repo
      ansible.builtin.command:
        cmd: helm repo add jetstack https://charts.jetstack.io
        creates: "{{ home_dir }}/.cache/helm/repository/jetstack-index.yaml"
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      changed_when: true

    - name: Install cert-manager
      ansible.builtin.command: >
        helm upgrade --install cert-manager jetstack/cert-manager
        --namespace cert-manager
        --create-namespace
        -f {{ repo_root }}/kubernetes/infrastructure/cert-manager/values.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Create Cloudflare API token secret (cert-manager)
      ansible.builtin.command: >
        kubectl create secret generic cloudflare-api-token
        --from-literal=api-token={{ cert_manager_cloudflare_token }}
        --namespace cert-manager
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      when: cert_manager_cloudflare_token | length > 0
      failed_when: false  # ignore if secret already exists

    - name: Remind to create Cloudflare secret if not provided
      ansible.builtin.debug:
        msg: |
          Geen cert_manager_cloudflare_token meegegeven. Maak handmatig aan:
            kubectl create secret generic cloudflare-api-token --from-literal=api-token=JOUW_TOKEN -n cert-manager
      when: cert_manager_cloudflare_token | length == 0

    - name: Apply ClusterIssuer letsencrypt-prod
      ansible.builtin.command: kubectl apply -f {{ repo_root }}/kubernetes/infrastructure/cert-manager/cluster-issuer-prod.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    # --- Fase J: Gateway stack ---
    - name: Apply gateway-system namespace
      ansible.builtin.command: kubectl apply -f {{ repo_root }}/kubernetes/infrastructure/gateway/namespace.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Apply Certificate (wildcard)
      ansible.builtin.command: kubectl apply -f {{ repo_root }}/kubernetes/infrastructure/gateway/certificate.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Apply Gateway (HTTPS)
      ansible.builtin.command: kubectl apply -f {{ repo_root }}/kubernetes/infrastructure/gateway/gateway.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Apply gateway test app and HTTPRoute
      ansible.builtin.command: >
        kubectl apply -f {{ repo_root }}/kubernetes/infrastructure/gateway/gateway-test-app.yaml
        -f {{ repo_root }}/kubernetes/infrastructure/gateway/httproute-test.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    # --- Fase K: Argo CD ---
    - name: Add Argo CD Helm repo
      ansible.builtin.command:
        cmd: helm repo add argo https://argoproj.github.io/argo-helm
        creates: "{{ home_dir }}/.cache/helm/repository/argo-index.yaml"
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      changed_when: true

    - name: Update Helm repos
      ansible.builtin.command: helm repo update
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Install Argo CD
      ansible.builtin.command: >
        helm upgrade --install argocd argo/argo-cd
        --namespace argocd
        --create-namespace
        -f {{ repo_root }}/kubernetes/infrastructure/argocd/values.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Wait for Argo CD server to be ready
      ansible.builtin.command: >
        kubectl wait deployment argocd-server
        --namespace argocd
        --for=condition=available
        --timeout=180s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Apply Argo CD HTTPRoute
      ansible.builtin.command: kubectl apply -f {{ repo_root }}/kubernetes/infrastructure/argocd/httproute.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    # --- Verificatie (Fase L deel) ---
    - name: Show nodes
      ansible.builtin.command: kubectl get nodes
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: nodes_out
      changed_when: false

    - name: Display nodes
      ansible.builtin.debug:
        var: nodes_out.stdout_lines

    - name: Show Gateway EXTERNAL-IP
      ansible.builtin.command: kubectl get svc -n gateway-system
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: gw_svc
      changed_when: false

    - name: Display Gateway services (noteer EXTERNAL-IP voor DNS)
      ansible.builtin.debug:
        var: gw_svc.stdout_lines

    - name: Post-bootstrap done
      ansible.builtin.debug:
        msg: |
          Fase F t/m K klaar. Controleer: kubectl get certificate -n gateway-system -w (tot Ready).
          DNS: A-record test.westerweel.work → EXTERNAL-IP hierboven. Verificatie: curl -v https://test.westerweel.work
      changed_when: false
