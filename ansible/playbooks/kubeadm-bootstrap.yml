---
# HA kubeadm-bootstrap: kube-vip VIP (.201) + 3 control-plane + workers.
# Draai NA prepare-nodes.yml + kubeadm-install-packages.yml. Idempotent:
#   - init alleen als /etc/kubernetes/admin.conf nog niet bestaat
#   - join alleen als /etc/kubernetes/kubelet.conf nog niet bestaat
#
# Eerste host in groep control_plane = init-node; de rest joint als control-plane.
# Vereist inventory met groepen control_plane (3) + workers (3).
#
#   ansible-playbook -i inventory/hosts.yml playbooks/kubeadm-bootstrap.yml
#
# Na de eerste run: kopieer admin.conf naar jumpy (kubeconfig wijst op .201 = VIP).

- name: kube-vip VIP + init eerste control-plane
  hosts: control_plane
  become: true

  vars:
    kube_vip_version: "v1.2.0"
    kube_vip_image: "ghcr.io/kube-vip/kube-vip:v1.2.0"
    vip_address: "192.168.178.201"
    vip_interface: "eth0"

  tasks:
    - name: Bepaal init-node (eerste control_plane host)
      ansible.builtin.set_fact:
        is_init_node: "{{ inventory_hostname == groups['control_plane'][0] }}"

    - name: Check of al geïnitialiseerd
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: admin_conf

    - name: Manifests-dir bestaat (kube-vip static pod)
      ansible.builtin.file:
        path: /etc/kubernetes/manifests
        state: directory
        mode: '0755'
      when: is_init_node

    - name: Pull kube-vip image (ctr, default namespace — idempotent)
      ansible.builtin.command: "ctr image pull {{ kube_vip_image }}"
      when: is_init_node
      changed_when: false

    - name: Genereer kube-vip static pod manifest (ARP, control-plane, leaderElection)
      ansible.builtin.shell: >
        ctr run --rm --net-host {{ kube_vip_image }} vip
        /kube-vip manifest pod
        --interface {{ vip_interface }}
        --address {{ vip_address }}
        --controlplane --arp --leaderElection
        > /etc/kubernetes/manifests/kube-vip.yaml
      args:
        creates: /etc/kubernetes/manifests/kube-vip.yaml
      when: is_init_node

    - name: Kopieer kubeadm-config
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/kubeadm-config.yaml"
        dest: /tmp/kubeadm-config.yaml
        mode: '0644'
      when: is_init_node and not admin_conf.stat.exists

    - name: kubeadm init (HA, --upload-certs)
      ansible.builtin.command: /usr/bin/kubeadm init --config /tmp/kubeadm-config.yaml --upload-certs
      register: kubeadm_init
      when: is_init_node and not admin_conf.stat.exists
      changed_when: true

    - name: .kube-dir voor ubuntu-user
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.kube"
        state: directory
        mode: '0755'
      when: is_init_node

    - name: admin.conf -> ~/.kube/config
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: "{{ ansible_env.HOME }}/.kube/config"
        remote_src: true
        owner: "{{ ansible_user_id }}"
        mode: '0600'
      when: is_init_node

    - name: Genereer verse certificate-key (voor CP-joins)
      ansible.builtin.shell: "set -o pipefail; /usr/bin/kubeadm init phase upload-certs --upload-certs | tail -1"
      args:
        executable: /bin/bash
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: cert_key_result
      changed_when: false
      when: is_init_node

    - name: Genereer worker join-command
      ansible.builtin.command: /usr/bin/kubeadm token create --print-join-command
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: join_cmd_result
      changed_when: false
      when: is_init_node

    - name: Bewaar join-gegevens als facts (op init-node)
      ansible.builtin.set_fact:
        worker_join_command: "{{ join_cmd_result.stdout }}"
        cp_cert_key: "{{ cert_key_result.stdout }}"
      when: is_init_node

- name: Join overige control-plane nodes
  hosts: control_plane
  become: true

  vars:
    kube_vip_image: "ghcr.io/kube-vip/kube-vip:v1.2.0"
    vip_address: "192.168.178.201"
    vip_interface: "eth0"

  tasks:
    - name: Init-node? (overslaan)
      ansible.builtin.set_fact:
        is_init_node: "{{ inventory_hostname == groups['control_plane'][0] }}"

    - name: Check of al gejoind
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Join als control-plane (--control-plane --certificate-key)
      ansible.builtin.shell: >
        {{ hostvars[groups['control_plane'][0]].worker_join_command | replace('kubeadm ', '/usr/bin/kubeadm ', 1) }}
        --control-plane --certificate-key {{ hostvars[groups['control_plane'][0]].cp_cert_key }}
      when:
        - not is_init_node
        - not kubelet_conf.stat.exists
      changed_when: true

    - name: Pull kube-vip image op deze CP
      ansible.builtin.command: "ctr image pull {{ kube_vip_image }}"
      when: not is_init_node
      changed_when: false

    - name: kube-vip manifest op deze CP (VIP-failover)
      ansible.builtin.shell: >
        ctr run --rm --net-host {{ kube_vip_image }} vip
        /kube-vip manifest pod
        --interface {{ vip_interface }}
        --address {{ vip_address }}
        --controlplane --arp --leaderElection
        > /etc/kubernetes/manifests/kube-vip.yaml
      args:
        creates: /etc/kubernetes/manifests/kube-vip.yaml
      when: not is_init_node

- name: Join workers
  hosts: workers
  become: true

  tasks:
    - name: Check of al gejoind
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: kubeadm join (worker)
      ansible.builtin.shell: "{{ hostvars[groups['control_plane'][0]].worker_join_command | replace('kubeadm ', '/usr/bin/kubeadm ', 1) }}"
      when:
        - not kubelet_conf.stat.exists
        - hostvars[groups['control_plane'][0]].worker_join_command is defined
      changed_when: true
