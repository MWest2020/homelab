---
# Variabelen voor kubeadm-migratie (zelfde als docs/02-network.md)
k8s_version: "1.36"
k8s_control_plane_endpoint: "192.168.178.201:6443"  # kube-vip VIP — kubeconfig blijft hierop wijzen
k8s_pod_network_cidr: "10.200.0.0/16"
k8s_service_cidr: "10.32.0.0/24"

# Kubernetes package repo (Debian/Ubuntu) — single source of truth voor key + repo.
# De v1.36-repo serveert momenteel patch 1.36.1 (latest, 2026-05-12).
# Voor Alma/RHEL: gebruik playbooks met dnf of role met os_family check
k8s_apt_repo_key_url: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key"
k8s_apt_repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/ /"
