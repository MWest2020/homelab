---
# Hypervisor-hosts — bare-metal/VM-hosts die geen tenant-workload draaien
# maar wel ansible-managed config nodig hebben (bv. Tailscale subnet routing).
#
# Tailscale-IP's: bereikbaar vanaf zowel jumpy als alma. LAN-IP's zijn vanaf
# jumpy niet routeerbaar (host-IP wordt niet als route geadverteerd).

all:
  children:
    # De standalone laptop-Proxmox (Nextcloud-VM's). Adverteert de .50-.59 routes
    # (zie group_vars/hypervisors.yml). px-cluster zit hier BEWUST niet bij.
    hypervisors:
      hosts:
        proxmox-laptop:
          ansible_host: 100.94.15.50

    # Het 3-node Proxmox-cluster voor de K8s-VM's (Fase 1+).
    # tmpl_base = eigen VMID-reeks per host (VMID's zijn cluster-breed uniek,
    # local-lvm kan niet cross-node clonen): base / +1 = CP / +2 = worker.
    proxmox_cluster:
      hosts:
        px-01:
          ansible_host: 100.120.76.22
          tmpl_base: 9000        # 9000 / 9001 (CP) / 9002 (worker)
        px-02:
          ansible_host: 100.89.39.27
          tmpl_base: 9010        # 9010 / 9011 / 9012
        px-03:
          ansible_host: 100.94.64.49
          tmpl_base: 9020        # 9020 / 9021 / 9022

  vars:
    ansible_user: root
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519_homelab
    # Alleen deze key aanbieden; anders biedt de agent te veel keys aan en kapt
    # de server af op MaxAuthTries ("Too many authentication failures").
    ansible_ssh_common_args: '-o IdentitiesOnly=yes'
    ansible_python_interpreter: /usr/bin/python3
    ansible_become: false   # already root via ansible_user
