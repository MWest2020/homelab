---
# Management / utility VMs (jumpbox, bastion, admin nodes)
# Not tied to a specific hypervisor — jumpy currently runs on VMware.

all:
  children:
    management:
      hosts:
        jumpy:
          ansible_host: 100.110.242.128
          ansible_user: jump
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_homelab

  vars:
    ansible_python_interpreter: /usr/bin/python3
    ansible_become: true
    ansible_become_method: sudo
