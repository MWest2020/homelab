---
# Ansible inventory voor de nginx + Nextcloud debug-lab.
# Twee identieke VMs op Proxmox; lab_state stuurt of een host bare blijft (clean)
# of volledig + gesaboteerd geconfigureerd wordt (broken).

all:
  children:
    nginx_lab:
      hosts:
        nginx-lab-clean:
          ansible_host: 192.168.178.55
          lab_state: clean
        nginx-lab-broken:
          ansible_host: 192.168.178.56
          lab_state: broken

  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519_homelab
    ansible_python_interpreter: /usr/bin/python3
    ansible_become: true
    ansible_become_method: sudo
