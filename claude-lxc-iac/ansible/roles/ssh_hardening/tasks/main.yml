---
# SSH hardening: drop-in config that:
#   - disables password auth (key-only)
#   - disables root login
#   - restricts allowed users to the dev_user
#
# The handler reloads sshd. We then verify the new dev_user can still SSH
# before considering this role done — lockout prevention.

- name: Deploy SSH hardening drop-in
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/10-hardening.conf
    content: |
      # Managed by ansible: claude-lxc-iac/roles/ssh_hardening.
      # Do not edit by hand; changes will be overwritten on next run.
      PasswordAuthentication no
      PermitRootLogin no
      PubkeyAuthentication yes
      AllowUsers {{ dev_user }}
    owner: root
    group: root
    mode: "0644"
    validate: "/usr/sbin/sshd -t -f %s"
  notify: reload sshd

# Force the handler to fire before we test, so the verify step actually checks
# the new config rather than the pre-reload state.
- name: Flush handlers so sshd reload happens before lockout check
  ansible.builtin.meta: flush_handlers

- name: Verify sshd still listens on port 22 after reload
  ansible.builtin.wait_for:
    port: 22
    host: 127.0.0.1
    timeout: 20
    state: started
