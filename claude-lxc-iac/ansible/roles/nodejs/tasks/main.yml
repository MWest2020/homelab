---
# Node.js from NodeSource (signed-by, no curl|bash install script).
# Also configures the dev_user's npm prefix to ~/.npm-global so we never
# need to npm install -g as root.

- name: Ensure /usr/share/keyrings exists
  ansible.builtin.file:
    path: /usr/share/keyrings
    state: directory
    mode: "0755"

- name: Download NodeSource signing key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /usr/share/keyrings/nodesource.asc
    mode: "0644"

- name: Add NodeSource apt repo for Node {{ node_major_version }}.x (signed-by)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/nodesource.list
    content: |
      # Managed by ansible: claude-lxc-iac/roles/nodejs.
      deb [signed-by=/usr/share/keyrings/nodesource.asc] https://deb.nodesource.com/node_{{ node_major_version }}.x nodistro main
    owner: root
    group: root
    mode: "0644"
  register: nodesource_repo

- name: Pin NodeSource above default Ubuntu repos
  ansible.builtin.copy:
    dest: /etc/apt/preferences.d/nodesource
    content: |
      # Managed by ansible: claude-lxc-iac/roles/nodejs.
      Package: nodejs
      Pin: origin deb.nodesource.com
      Pin-Priority: 600
    owner: root
    group: root
    mode: "0644"

- name: Refresh apt cache after adding NodeSource repo
  ansible.builtin.apt:
    update_cache: true
  when: nodesource_repo.changed

- name: Install nodejs (includes npm)
  ansible.builtin.apt:
    name: nodejs
    state: present

- name: Verify node and npm are on PATH
  ansible.builtin.command: "{{ item }} --version"
  register: ver
  changed_when: false
  loop:
    - node
    - npm

- name: Configure npm prefix to ~/.npm-global for {{ dev_user }}
  community.general.npm:
    name: ""           # not installing a package, just configuring
    global: false
    state: present
  become_user: "{{ dev_user }}"
  failed_when: false
  # The npm module doesn't expose a clean "set prefix" — use a direct
  # command for that single config line. Idempotent via stdout-equality check.

- name: Set npm prefix (idempotent)
  ansible.builtin.command:
    cmd: "npm config set prefix {{ '~/.npm-global' }}"
  become_user: "{{ dev_user }}"
  register: npm_prefix
  changed_when: false   # npm config set is idempotent; no clean change signal

- name: Ensure ~/.npm-global directory exists
  ansible.builtin.file:
    path: "/home/{{ dev_user }}/.npm-global"
    state: directory
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0755"

- name: Add ~/.npm-global/bin to PATH in {{ dev_user }}'s .bashrc
  ansible.builtin.blockinfile:
    path: "/home/{{ dev_user }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED — npm-global PATH"
    block: |
      export PATH="$HOME/.npm-global/bin:$PATH"
    create: true
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0644"
