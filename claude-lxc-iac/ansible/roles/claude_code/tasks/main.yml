---
# Install Claude Code globally for the dev user, drop a sensible tmux.conf,
# and OPTIONALLY sync the operator's ~/.claude/ config (sanitised) if it's
# present on the Ansible controller.
#
# Controller-side reads use ansible's `lookup('file', ..., errors='ignore')`
# which runs in-process on the controller — no ssh, no sudo, no delegation.
# This avoids the known delegate_to + become precedence quirks in
# Ansible 2.16.

- name: Try to read operator's Claude config from the controller
  ansible.builtin.set_fact:
    operator_settings_raw: "{{ lookup('file', operator_claude_dir + '/settings.json', errors='ignore') }}"
    operator_claude_md_raw: "{{ lookup('file', operator_claude_dir + '/CLAUDE.md', errors='ignore') }}"

- name: Determine whether Claude config sync is possible
  ansible.builtin.set_fact:
    claude_config_syncable: "{{ (operator_settings_raw | length > 0) and (operator_claude_md_raw | length > 0) }}"

- name: Warn if controller lacks Claude config (sync will be skipped)
  ansible.builtin.debug:
    msg: >-
      Operator's Claude config not found at {{ operator_claude_dir }} on the
      controller. Sync of settings.json + CLAUDE.md skipped. To enable later:
      rsync ~/.claude/{settings.json,CLAUDE.md} from alma to this controller
      and re-run `--tags claude_code`.
  when: not claude_config_syncable

- name: Install Claude Code globally for {{ dev_user }}
  community.general.npm:
    name: "@anthropic-ai/claude-code"
    global: true
    state: present
  become_user: "{{ dev_user }}"
  environment:
    NPM_CONFIG_PREFIX: "/home/{{ dev_user }}/.npm-global"

- name: Verify claude --version works
  ansible.builtin.command: claude --version
  become_user: "{{ dev_user }}"
  environment:
    PATH: "/home/{{ dev_user }}/.npm-global/bin:{{ ansible_env.PATH }}"
  register: claude_version
  changed_when: false

- name: Ensure ~/.claude/ exists for {{ dev_user }}
  ansible.builtin.file:
    path: "/home/{{ dev_user }}/.claude"
    state: directory
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0755"

# --- conditional sync block (only when controller has the source files) ---

- name: Parse operator's settings.json
  ansible.builtin.set_fact:
    operator_settings: "{{ operator_settings_raw | from_json }}"
  when: claude_config_syncable

- name: Deploy sanitised settings.json to {{ dev_user }}
  # Strip alma-specific sections (hooks paths, enabledPlugins, extraKnownMarketplaces).
  # Keep permissions.deny (universal), theme, skipAutoPermissionPrompt.
  ansible.builtin.copy:
    content: "{{ sanitised_settings | to_nice_json }}\n"
    dest: "/home/{{ dev_user }}/.claude/settings.json"
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0600"
  vars:
    sanitised_settings:
      permissions: "{{ operator_settings.permissions | default({}) }}"
      theme: "{{ operator_settings.theme | default('auto') }}"
      skipAutoPermissionPrompt: "{{ operator_settings.skipAutoPermissionPrompt | default(false) }}"
  when: claude_config_syncable

- name: Deploy CLAUDE.md (sanitised + SCOPE-section appended)
  ansible.builtin.template:
    src: claude_md.j2
    dest: "/home/{{ dev_user }}/.claude/CLAUDE.md"
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0644"
  when: claude_config_syncable

# --- always-run regardless of sync ---

- name: Deploy ~/.tmux.conf for {{ dev_user }}
  ansible.builtin.copy:
    dest: "/home/{{ dev_user }}/.tmux.conf"
    content: |
      # Managed by ansible: claude-lxc-iac/roles/claude_code.
      set -g mouse on
      set -g history-limit 50000
      set -g default-terminal "screen-256color"
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0644"

- name: Announce next interactive step
  ansible.builtin.debug:
    msg:
      - "Claude Code installed: {{ claude_version.stdout }}"
      - "Config sync: {{ 'done' if claude_config_syncable else 'SKIPPED (no controller-side ~/.claude/)' }}"
      - "SSH in as {{ dev_user }} and run 'claude' to complete account login."
      - "Browser-flow falls back to copy-paste URL on headless systems."
