# OpenWoo-acc tenant stack.
# Single VM (klant-d) — bypasses Caddy proxy, customer wants pure nginx as edge.
#
# Public flow:
#   internet → router 80/443 forward → VM .59
#   nginx-edge (80/443) does TLS + vhost routing:
#     openwoo.acc.westerweel.work → nextcloud-nginx (internally :80)
#     open.acc.westerweel.work    → woo-website     (internally :80)
#
# Per-customer side note: nextcloud-nginx ALSO exposes :8080 on host so the
# customer can hit Nextcloud directly via http://192.168.178.59:8080 if they
# need to bypass nginx-edge for internal testing.

services:
  # --- nginx edge: TLS + reverse proxy for both hostnames ---
  nginx-edge:
    image: nginx:1.27-alpine
    container_name: openwoo-acc-edge
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-edge.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - nextcloud-nginx
      - woo-website
    networks:
      - openwoo-acc

  # --- Nextcloud stack ---
  nextcloud-nginx:
    image: nginx:1.27-alpine
    container_name: openwoo-acc-nc-nginx
    restart: unless-stopped
    ports:
      - "8080:80"   # customer wants Nextcloud on host port 8080
    volumes:
      - ./nginx-nextcloud.conf:/etc/nginx/conf.d/default.conf:ro
      - nextcloud-html:/var/www/html:ro
    depends_on:
      - nextcloud-fpm
    networks:
      openwoo-acc:
        # Internal DNS alias zodat de woo-website-container z'n
        # server-side proxy_pass naar `openwoo.acc.westerweel.work`
        # binnen de Docker network resolven kan — geen externe DNS
        # en geen public-route-loop nodig. Browser-clients hitten de
        # publieke hostname via internet → nginx-edge → nextcloud-nginx
        # zoals normaal.
        aliases:
          - openwoo.acc.westerweel.work

  nextcloud-fpm:
    image: nextcloud:30-fpm
    container_name: openwoo-acc-nc-fpm
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-nextcloud}
      POSTGRES_USER: ${POSTGRES_USER:-nextcloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: valkey
      REDIS_HOST_PORT: "6379"
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: "openwoo.acc.westerweel.work 192.168.178.59"
      OVERWRITEHOST: openwoo.acc.westerweel.work
      OVERWRITEPROTOCOL: https
      TRUSTED_PROXIES: "172.16.0.0/12"
    volumes:
      - nextcloud-html:/var/www/html
      - nextcloud-data:/var/www/html/data
      - nextcloud-custom-apps:/var/www/html/custom_apps
    depends_on:
      - postgres
      - valkey
    networks:
      - openwoo-acc

  postgres:
    image: postgres:16-alpine
    container_name: openwoo-acc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nextcloud}
      POSTGRES_USER: ${POSTGRES_USER:-nextcloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - openwoo-acc

  valkey:
    image: valkey/valkey:7-alpine
    container_name: openwoo-acc-valkey
    restart: unless-stopped
    command: ["valkey-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - valkey-data:/data
    networks:
      - openwoo-acc

  # --- Woo-website ---
  # Env-vars verified against ConductionNL/woo-website-template-apiv2 compose
  # + the helm-values pattern operator already runs in k8s.
  #   - UPSTREAM_HOST  + UPSTREAM_BASE  → runtime, vereist (waar de OpenCatalogi-API leeft)
  #   - GATSBY_*                         → per-tenant runtime branding (Gatsby leest env)
  # OpenCatalogi-API zit straks in onze Nextcloud zodra Patrick's apps zijn
  # geactiveerd (occ app:enable opencatalogi). Tot dan: bovenstaande URLs OK
  # maar de site rendert leeg/error totdat de API ervoor staat.
  woo-website:
    image: ghcr.io/conductionnl/woo-website-v2:latest
    container_name: openwoo-acc-woo
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      # Image's nginx-template gebruikt lowercase envsubst-placeholders
      # ($upstream_host, $upstream_base). Daarnaast leest /docker-entrypoint.d/
      # 30-generate-runtime.sh ze ook. Beide casings zetten = idiot-proof.
      UPSTREAM_HOST: openwoo.acc.westerweel.work
      UPSTREAM_BASE: https://openwoo.acc.westerweel.work/apps/opencatalogi/api
      upstream_host: openwoo.acc.westerweel.work
      upstream_base: https://openwoo.acc.westerweel.work/apps/opencatalogi/api
      GATSBY_API_BASE_URL: https://openwoo.acc.westerweel.work/apps/opencatalogi/api
      GATSBY_ORGANISATION_NAME: ${WOO_ORGANISATION_NAME:-OpenWoo Acceptatie}
      NL_DESIGN_THEME_CLASSNAME: ${WOO_THEME_CLASSNAME:-utrecht-theme}
      GATSBY_JUMBOTRON_IMAGE_URL: ${WOO_JUMBOTRON_URL:-}
      GATSBY_FAVICON_URL: ${WOO_FAVICON_URL:-}
    networks:
      - openwoo-acc

  # --- Certbot sidecar (HTTP-01 via shared webroot) ---
  certbot:
    image: certbot/certbot:latest
    container_name: openwoo-acc-certbot
    # Don't auto-start — run interactively for initial cert, then via cron.
    # Initial:
    #   docker compose run --rm certbot certonly --webroot \
    #     --webroot-path=/var/www/certbot \
    #     -d openwoo.acc.westerweel.work -d open.acc.westerweel.work \
    #     --email mark@conduction.nl --agree-tos --no-eff-email
    # Renew (idempotent):
    #   docker compose run --rm certbot renew && \
    #     docker compose exec nginx-edge nginx -s reload
    profiles: ["tools"]
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot

volumes:
  nextcloud-html:
  nextcloud-data:
  nextcloud-custom-apps:
  postgres-data:
  valkey-data:
  letsencrypt:
  certbot-webroot:

networks:
  openwoo-acc:
    driver: bridge
