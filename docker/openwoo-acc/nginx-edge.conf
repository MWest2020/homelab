# nginx-edge: publieke TLS-terminator + reverse proxy.
# Twee vhosts, allebei achter Let's Encrypt-certs via certbot (HTTP-01 webroot).
#
# Initial deploy: nginx start't met dit conf — als certs er nog niet zijn,
# faalt nginx te starten. Eerste run dus zonder de TLS-blocks (commenten
# tot certbot een keer is gerund). Zie runbook.

# ---------- ACME challenge (port 80) — altijd, ook na TLS aan ----------
server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name openwoo.acc.westerweel.work open.acc.westerweel.work;

    # certbot webroot — voor renew + initial issuance
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # alles anders: doorsturen naar HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- openwoo.acc.westerweel.work → Nextcloud ----------
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name openwoo.acc.westerweel.work;

    ssl_certificate     /etc/letsencrypt/live/openwoo.acc.westerweel.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openwoo.acc.westerweel.work/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Nextcloud kan grote files uploaden; verhoog body-limit.
    client_max_body_size 10G;

    location / {
        proxy_pass         http://nextcloud-nginx:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }
}

# ---------- open.acc.westerweel.work → woo-website ----------
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name open.acc.westerweel.work;

    ssl_certificate     /etc/letsencrypt/live/openwoo.acc.westerweel.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openwoo.acc.westerweel.work/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 100M;

    location / {
        proxy_pass         http://woo-website:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_read_timeout 120s;
    }
}
