services:
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  woo-klant-a:
    image: ghcr.io/conductionnl/woo-website-v2
    restart: always
    environment:
      - UPSTREAM_BASE=https://klant-a.westerweel.work/apps/opencatalogi/api
      - UPSTREAM_HOST=klant-a.westerweel.work

  woo-klant-b:
    image: ghcr.io/conductionnl/woo-website-v2
    restart: always
    environment:
      - UPSTREAM_BASE=https://klant-b.westerweel.work/apps/opencatalogi/api
      - UPSTREAM_HOST=klant-b.westerweel.work

  woo-klant-c:
    image: ghcr.io/conductionnl/woo-website-v2
    restart: always
    environment:
      - UPSTREAM_BASE=https://klant-c.westerweel.work/apps/opencatalogi/api
      - UPSTREAM_HOST=klant-c.westerweel.work

volumes:
  caddy_data:
  caddy_config:
