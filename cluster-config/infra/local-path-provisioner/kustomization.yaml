---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - local-path-storage.yaml

patches:
  # Make local-path the default StorageClass
  - patch: |-
      - op: add
        path: /metadata/annotations
        value:
          storageclass.kubernetes.io/is-default-class: "true"
    target:
      kind: StorageClass
      name: local-path
